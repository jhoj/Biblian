<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Clip to circle -->
    <clipPath id="circle-clip">
      <circle cx="256" cy="256" r="246"/>
    </clipPath>

    <!-- Cross glow filter -->
    <filter id="cross-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.39 0 0 0 0
                0.82 0 0 0 0
                0.87 0 0 0 0
                0    0 0 2 -0.2"
        result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Cover radial gradient -->
    <radialGradient id="cover-grad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2E2E52"/>
      <stop offset="100%" stop-color="#18183A"/>
    </radialGradient>

    <!-- Spine linear gradient -->
    <linearGradient id="spine-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4A4A7A"/>
      <stop offset="100%" stop-color="#30305A"/>
    </linearGradient>

    <!-- Top-left cover highlight -->
    <linearGradient id="highlight-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#0A0A12"/>

  <!-- Clipped content -->
  <g clip-path="url(#circle-clip)">

    <!-- ── Closed Book (front-cover view) ── -->
    <!-- Book body: slight perspective — right edge slightly shorter -->
    <path d="
      M 104 96
      C 104 92, 108 88, 112 88
      L 412 92
      C 416 92, 420 96, 420 100
      L 420 416
      C 420 420, 416 424, 412 424
      L 112 428
      C 108 428, 104 424, 104 420
      Z
    " fill="url(#cover-grad)" stroke="#4A4A78" stroke-width="3"/>

    <!-- Spine strip: narrow vertical strip on left edge -->
    <path d="
      M 104 96
      C 104 92, 108 88, 112 88
      L 136 88
      L 136 428
      L 112 428
      C 108 428, 104 424, 104 420
      Z
    " fill="url(#spine-grad)" stroke="#5A5A88" stroke-width="1"/>

    <!-- Page-edge top band -->
    <rect x="136" y="88" width="284" height="10" rx="0" fill="#303058"/>

    <!-- Page-edge bottom band -->
    <rect x="136" y="418" width="284" height="10" rx="0" fill="#303058"/>

    <!-- Top-left cover highlight overlay -->
    <path d="
      M 104 96
      C 104 92, 108 88, 112 88
      L 412 92
      C 416 92, 420 96, 420 100
      L 420 416
      C 420 420, 416 424, 412 424
      L 112 428
      C 108 428, 104 424, 104 420
      Z
    " fill="url(#highlight-grad)"/>

    <!-- Cover texture lines (subtle horizontal) -->
    <line x1="148" y1="165" x2="408" y2="165" stroke="#282848" stroke-width="1" opacity="0.9"/>
    <line x1="148" y1="205" x2="408" y2="205" stroke="#282848" stroke-width="1" opacity="0.7"/>
    <line x1="148" y1="315" x2="408" y2="315" stroke="#282848" stroke-width="1" opacity="0.7"/>
    <line x1="148" y1="355" x2="408" y2="355" stroke="#282848" stroke-width="1" opacity="0.9"/>

    <!-- ── Latin Cross ── -->
    <!-- Glow layer: fill-only in cyan, blurred to create halo -->
    <path filter="url(#cross-glow)"
      d="M 238 148 L 274 148 L 274 208 L 334 208 L 334 244 L 274 244 L 274 364 L 238 364 L 238 244 L 178 244 L 178 208 L 238 208 Z"
      fill="#63D0DF" stroke="none"/>
    <!-- Cross fill on top: solid light color, no stroke -->
    <path
      d="M 238 148 L 274 148 L 274 208 L 334 208 L 334 244 L 274 244 L 274 364 L 238 364 L 238 244 L 178 244 L 178 208 L 238 208 Z"
      fill="#7A90A8" stroke="none"/>

  </g>

  <!-- Outer cyan ring -->
  <circle cx="256" cy="256" r="246" fill="none" stroke="#63D0DF" stroke-width="10"/>
</svg>
