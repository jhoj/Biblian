<!DOCTYPE html>
<html lang="fo">
<head>
  <meta charset="UTF-8">
  <title>Biblían - Stýring</title>
  <link rel="stylesheet" href="control.css">
</head>
<body>
  <div class="app">
    <!-- Slim header -->
    <header class="header">
      <div class="header-left">
        <button id="btn-search" class="icon-btn" title="Leita (Ctrl+S)">&#x1F50D;</button>
      </div>
      <div class="header-center">
        <label>
          Støddi:
          <input type="range" id="font-size" min="24" max="120" value="56">
          <span id="font-size-val">56px</span>
        </label>
        <label>
          Bakgr:
          <input type="color" id="bg-color" value="#000000">
        </label>
        <label>
          Litur:
          <input type="color" id="text-color" value="#ffffff">
        </label>
      </div>
    </header>

    <!-- Three-column main content -->
    <div class="main-content">
      <!-- Left: navigation column (drill-down) -->
      <div class="nav-column" id="nav-column"></div>

      <!-- Center: reading pane -->
      <div class="reading-pane" id="reading-pane">
        <div class="reading-placeholder">Vel eina bók og kapittul</div>
      </div>

      <!-- Right: preview column -->
      <div class="preview-column">
        <div class="mini-preview" id="mini-preview">
          <div class="mini-preview-display" id="mini-preview-display">
            <div class="mini-ref" id="mini-ref"></div>
            <div class="mini-text" id="mini-text"></div>
          </div>
        </div>
        <div class="capacity-info">
          <div>Pláss til: <strong id="capacity-val">&mdash;</strong></div>
          <div>Vísir: <strong id="charcount-val">0</strong></div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <select id="screen-select" title="Vel skígga">
        <option value="">Skíggjar...</option>
      </select>
      <button id="btn-fullscreen" class="footer-btn" title="Fullur skíggur (F11)">&#x26F6;</button>
      <button id="btn-clear" class="footer-btn btn-clear" title="Reinsa skígga">Reinsa</button>
    </footer>

    <!-- Search overlay -->
    <div class="search-overlay" id="search-overlay" style="display:none;">
      <div class="search-backdrop" id="search-backdrop"></div>
      <div class="search-dialog">
        <input
          type="text"
          id="search-input"
          placeholder="Leita... (t.d. 'sælir eru' ella 'Jóh 3:16')"
          autocomplete="off"
        >
        <ul id="search-results" class="search-results-list"></ul>
      </div>
    </div>
  </div>

  <script src="control.js"></script>
</body>
</html>
