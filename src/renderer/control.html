<!DOCTYPE html>
<html lang="fo">
<head>
  <meta charset="UTF-8">
  <title>Biblían - Stýring</title>
  <link rel="stylesheet" href="control.css">
</head>
<body>
  <div class="app">
    <!-- Slim header -->
    <header class="header">
      <div class="header-left">
        <button id="btn-search" class="icon-btn" title="Leita (L)">&#x1F50D;</button>
        <button id="btn-display" class="header-btn btn-display-closed" title="Opna skíggiglugga">Opna skíggja</button>
        <select id="screen-select" title="Vel skígga">
          <option value="">Skíggjar...</option>
        </select>
        <button id="btn-fullscreen" class="header-btn" title="Fullur skíggur (F11)">&#x26F6;</button>
        <label class="header-toggle" title="Fjal tekstin (F)">
          <input type="checkbox" id="chk-hide-text">
          <span class="toggle-slider"></span>
          <span class="toggle-label" data-shortcut="f">Fjal tekstin</span>
        </label>
        <label class="header-toggle" title="Beinleiðis (B)">
          <input type="checkbox" id="chk-direct">
          <span class="toggle-slider"></span>
          <span class="toggle-label" data-shortcut="b">Beinleiðis</span>
        </label>
      </div>
      <div class="header-center">
        <label data-shortcut="s">
          Støddi:
          <input type="range" id="font-size" min="24" max="120" value="56">
          <span id="font-size-val">56px</span>
        </label>
        <label data-shortcut="m">
          Mynd litur:
          <input type="color" id="bg-color" value="#000000">
        </label>
        <label data-shortcut="t">
          Tekst litur:
          <input type="color" id="text-color" value="#ffffff">
        </label>
        <button id="btn-about" class="about-btn" title="Um Biblíuna">i</button>
      </div>
    </header>

    <!-- Three-column main content -->
    <div class="main-content">
      <!-- Left: navigation column (drill-down) -->
      <div class="nav-column" id="nav-column"></div>
      <div class="resize-handle" id="resize-left"></div>

      <!-- Center: reading pane -->
      <div class="reading-pane" id="reading-pane">
        <div class="reading-placeholder">Vel eina bók og kapittul</div>
      </div>
      <div class="resize-handle" id="resize-right"></div>

      <!-- Right: preview column -->
      <div class="preview-column" id="preview-column">
        <div class="mini-preview" id="mini-preview">
          <div class="mini-preview-display" id="mini-preview-display">
            <div class="mini-ref" id="mini-ref"></div>
            <div class="mini-text" id="mini-text"></div>
          </div>
        </div>
        <div class="capacity-info">
          <div>Pláss til: <strong id="capacity-val">&mdash;</strong></div>
          <div>Vísir: <strong id="charcount-val">0</strong></div>
        </div>
      </div>
    </div>

    <!-- About overlay -->
    <div class="about-overlay" id="about-overlay" style="display:none;">
      <div class="about-backdrop" id="about-backdrop"></div>
      <div class="about-dialog">
        <div class="about-header">
          <span class="about-title">Um Biblíuna</span>
          <button class="about-close" id="btn-about-close">&#x2715;</button>
        </div>
        <div class="about-body">
          <div class="about-appname">Biblían</div>
          <div class="about-version">Útgáva 1.0.1</div>
          <div class="about-desc">Føroyskt biblíuforrit fyri kirkjur og fyrilestrar.</div>
          <div class="about-author">Gjørt av Jákup Høj</div>
        </div>
      </div>
    </div>

    <!-- Search overlay -->
    <div class="search-overlay" id="search-overlay" style="display:none;">
      <div class="search-backdrop" id="search-backdrop"></div>
      <div class="search-dialog">
        <div class="search-tabs">
          <button class="search-tab active" data-mode="verse">Vers</button>
          <button class="search-tab" data-mode="book">Bók</button>
        </div>
        <input
          type="text"
          id="search-input"
          placeholder="Leita í versum... (t.d. 'sælir eru' ella 'Jóh 3:16')"
          autocomplete="off"
        >
        <ul id="search-results" class="search-results-list"></ul>
      </div>
    </div>
  </div>

  <!-- Shortcut hints (shown while Alt is held) -->
  <div class="shortcut-hints" id="shortcut-hints" style="display:none;"></div>

  <!-- Search hints (shown while Alt is held in search) -->
  <div class="search-hints" id="search-hints" style="display:none;">
    <div class="search-hint-row"><kbd>&larr;</kbd><kbd>&rarr;</kbd> Skift millum Vers / Bók</div>
    <div class="search-hint-row"><kbd>&uarr;</kbd><kbd>&darr;</kbd> Vel úrslit</div>
    <div class="search-hint-row"><kbd>Enter</kbd> Far til valda vers / bók</div>
    <div class="search-hint-row"><kbd>0-9</kbd> Vel kapittul (Bók-leiting)</div>
    <div class="search-hint-row"><kbd>Esc</kbd> Lat aftur</div>
  </div>

  <script src="control.js"></script>
</body>
</html>
